{% extends "base.html" %}
{% block title %}Register — Creator Token Vault{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12 relative transition-colors duration-300">
    <div class="absolute inset-0 z-0 opacity-10 dark:opacity-20 pointer-events-none transition-opacity duration-300">
        <div class="absolute top-[-20%] left-[20%] w-[50%] h-[50%] bg-blue-500/20 dark:bg-blue-600/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="font-sans text-3xl font-bold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors duration-300">Join the <span class="font-display italic text-blue-600 dark:text-blue-400 font-light tracking-normal transition-colors duration-300">Vault.</span></h1>
            <p class="text-slate-600 dark:text-slate-400 text-sm font-light transition-colors duration-300">Create an account to start earning tokens.</p>
        </div>

        <!-- Register Card -->
        <div class="bg-white dark:bg-[#111] border border-slate-200 dark:border-white/10 p-8 shadow-xl dark:shadow-2xl transition-colors duration-300">
            <form method="POST" action="{{ url_for('register') }}" class="space-y-6" id="register-form">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-bold text-slate-600 dark:text-slate-500 uppercase tracking-wider mb-2 transition-colors duration-300">Username</label>
                    <div class="relative">
                        <input type="text" name="username" id="username" required
                               class="w-full px-4 py-3 bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none transition-colors duration-300 text-sm font-medium"
                               placeholder="creator_name">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-bold text-slate-600 dark:text-slate-500 uppercase tracking-wider mb-2 transition-colors duration-300">Email Address</label>
                    <div class="relative">
                        <input type="email" name="email" id="email" required
                               class="w-full px-4 py-3 bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none transition-colors duration-300 text-sm font-medium"
                               placeholder="you@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-bold text-slate-600 dark:text-slate-500 uppercase tracking-wider mb-2 transition-colors duration-300">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required
                               class="w-full px-4 py-3 bg-slate-50 dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none transition-colors duration-300 text-sm font-medium"
                               placeholder="Create a password">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="register-submit"
                        class="w-full py-3.5 bg-blue-600 text-white font-bold hover:bg-blue-700 dark:hover:bg-blue-500 transition-colors duration-300 text-sm shadow-sm dark:shadow-none">
                    Create Account
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-white/10 transition-colors duration-300"></div></div>
                <div class="relative flex justify-center"><span class="px-4 bg-white dark:bg-[#111] text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] transition-colors duration-300">OR</span></div>
            </div>

            <!-- Login Link -->
            <p class="text-center text-slate-600 dark:text-slate-400 text-sm font-light transition-colors duration-300">
                Already have an account?
                <a href="{{ url_for('login') }}" class="text-slate-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 font-bold transition-colors border-b border-slate-300 dark:border-white/30 hover:border-blue-600 dark:hover:border-blue-400 pb-0.5" id="register-to-login">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
