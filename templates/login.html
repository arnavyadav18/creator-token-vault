{% extends "base.html" %}
{% block title %}Login — Creator Token Vault{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#fcfcfc] dark:bg-[#000000] flex items-center justify-center px-6 py-24 transition-colors duration-500">

    <div class="w-full max-w-md relative z-10">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="font-sans text-4xl md:text-5xl font-medium text-black dark:text-white mb-4 tracking-tighter transition-colors duration-500">Access Vault.</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm font-light tracking-tight transition-colors duration-500">Sign in to track transactions and rewards.</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white dark:bg-[#050505] border border-slate-200 dark:border-white/10 p-10 transition-colors duration-500">
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6" id="login-form">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 pl-4 transition-colors duration-500">Email Address</label>
                    <div class="relative">
                        <input type="email" name="email" id="email" required
                               class="w-full px-6 py-4 rounded-full bg-[#fcfcfc] dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 text-black dark:text-white placeholder-slate-400 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue focus:outline-none transition-colors duration-500 text-sm font-medium"
                               placeholder="you@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 pl-4 transition-colors duration-500">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required
                               class="w-full px-6 py-4 rounded-full bg-[#fcfcfc] dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/10 text-black dark:text-white placeholder-slate-400 focus:border-brand-blue focus:ring-1 focus:ring-brand-blue focus:outline-none transition-colors duration-500 text-sm font-medium"
                               placeholder="Enter your password">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="login-submit"
                        class="augen-pill augen-pill-filled-blue w-full py-4 text-sm font-medium mt-4">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-10">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-white/10 transition-colors duration-500"></div></div>
                <div class="relative flex justify-center"><span class="px-4 bg-white dark:bg-[#050505] text-slate-400 text-[10px] font-bold uppercase tracking-widest transition-colors duration-500">OR</span></div>
            </div>

            <!-- Register Link -->
            <p class="text-center text-slate-500 dark:text-slate-400 text-sm font-light tracking-tight transition-colors duration-500">
                New to the Vault?
                <a href="{{ url_for('register') }}" class="text-black dark:text-white font-medium hover:text-brand-blue dark:hover:text-brand-blue transition-colors ml-1" id="login-to-register">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
