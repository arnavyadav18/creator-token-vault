{% extends "base.html" %}
{% block title %}Login — Creator Token Vault{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12 relative">
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
        <div class="absolute top-[-20%] left-[20%] w-[50%] h-[50%] bg-blue-600/20 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md relative z-10 animate-slide-up">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="font-sans text-3xl font-bold text-white mb-2 tracking-tight">Access <span class="font-display italic text-blue-400 font-light tracking-normal">Vault.</span></h1>
            <p class="text-slate-400 text-sm font-light">Sign in to track transactions and rewards.</p>
        </div>

        <!-- Login Card -->
        <div class="bg-[#111] border border-white/10 p-8 shadow-2xl">
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6" id="login-form">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <input type="email" name="email" id="email" required
                               class="w-full px-4 py-3 bg-[#0a0a0a] border border-white/10 text-white placeholder-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none transition-colors text-sm font-medium"
                               placeholder="you@example.com">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required
                               class="w-full px-4 py-3 bg-[#0a0a0a] border border-white/10 text-white placeholder-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none transition-colors text-sm font-medium"
                               placeholder="Enter your password">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="login-submit"
                        class="w-full py-3.5 bg-blue-600 text-white font-bold hover:bg-blue-500 transition-colors duration-200 text-sm">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                <div class="relative flex justify-center"><span class="px-4 bg-[#111] text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">OR</span></div>
            </div>

            <!-- Register Link -->
            <p class="text-center text-slate-400 text-sm font-light">
                New to the Vault?
                <a href="{{ url_for('register') }}" class="text-white hover:text-blue-400 font-bold transition-colors border-b border-white/30 hover:border-blue-400 pb-0.5" id="login-to-register">Create Account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
